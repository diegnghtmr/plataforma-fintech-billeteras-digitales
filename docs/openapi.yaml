openapi: 3.0.3
info:
  title: Plataforma Fintech de Billeteras Digitales API
  version: 1.0.0
  description: |
    Contrato REST entre el backend Spring Boot y el frontend React.
    Este archivo es la fuente de verdad para DTOs, endpoints y errores.
servers:
  - url: http://localhost:8080/api/v1
    description: Backend local Spring Boot
tags:
  - name: Users
  - name: Wallets
  - name: Operations
  - name: Transactions
  - name: Points
  - name: ScheduledOperations
  - name: Notifications
  - name: Analytics
  - name: Fraud
  - name: Benefits
  - name: Health
paths:
  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Verificar disponibilidad del servicio
      responses:
        '200':
          description: Servicio operativo
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: UP
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: Listar todos los usuarios
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
    post:
      tags: [Users]
      operationId: createUser
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/{userId}:
    get:
      tags: [Users]
      operationId: getUserById
      summary: Obtener usuario por ID
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      operationId: updateUser
      summary: Actualizar nombre o email del usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Eliminar usuario y datos en cascada
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Usuario eliminado
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{userId}/wallets:
    get:
      tags: [Wallets]
      operationId: getUserWallets
      summary: Listar billeteras de un usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Billeteras del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WalletResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Wallets]
      operationId: createWallet
      summary: Crear billetera para usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWalletRequest'
      responses:
        '201':
          description: Billetera creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/{userId}/wallets/{walletId}:
    patch:
      tags: [Wallets]
      operationId: updateWallet
      summary: Renombrar o cerrar/reabrir una billetera
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/WalletId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWalletRequest'
      responses:
        '200':
          description: Billetera actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /users/{userId}/wallets/{walletId}/recharge:
    post:
      tags: [Operations]
      operationId: rechargeWallet
      summary: Recargar billetera
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/WalletId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoneyOperationRequest'
      responses:
        '200':
          description: Recarga realizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /users/{userId}/wallets/{walletId}/withdraw:
    post:
      tags: [Operations]
      operationId: withdrawWallet
      summary: Retirar dinero de billetera
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/WalletId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoneyOperationRequest'
      responses:
        '200':
          description: Retiro realizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /users/{userId}/transfers/internal:
    post:
      tags: [Operations]
      operationId: createInternalTransfer
      summary: Transferir entre billeteras del mismo usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalTransferRequest'
      responses:
        '200':
          description: Transferencia interna realizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /transfers/external:
    post:
      tags: [Operations]
      operationId: createExternalTransfer
      summary: Transferir entre usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalTransferRequest'
      responses:
        '200':
          description: Transferencia externa realizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalTransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /users/{userId}/transactions:
    get:
      tags: [Transactions]
      operationId: getUserTransactions
      summary: Obtener historial del usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/TransactionTypeQuery'
        - $ref: '#/components/parameters/TransactionStatusQuery'
      responses:
        '200':
          description: Historial del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{userId}/wallets/{walletId}/transactions:
    get:
      tags: [Transactions]
      operationId: getWalletTransactions
      summary: Obtener historial de una billetera
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/WalletId'
      responses:
        '200':
          description: Historial de la billetera
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /transactions/{transactionId}:
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Obtener una transacción por ID
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transacción encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /transactions/{transactionId}/reverse:
    post:
      tags: [Transactions]
      operationId: reverseTransaction
      summary: Revertir una transacción
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transacción revertida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /users/{userId}/points:
    get:
      tags: [Points]
      operationId: getUserPoints
      summary: Obtener puntos y nivel del usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Puntos del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PointsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /points/ranking:
    get:
      tags: [Points]
      operationId: getPointsRanking
      summary: Obtener ranking de puntos
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Ranking descendente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RankingItemResponse'
  /scheduled-operations:
    get:
      tags: [ScheduledOperations]
      operationId: getScheduledOperations
      summary: Listar operaciones programadas
      responses:
        '200':
          description: Operaciones programadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduledOperationResponse'
    post:
      tags: [ScheduledOperations]
      operationId: createScheduledOperation
      summary: Crear operación programada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduledOperationRequest'
      responses:
        '201':
          description: Operación programada creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /scheduled-operations/{operationId}/cancel:
    post:
      tags: [ScheduledOperations]
      operationId: cancelScheduledOperation
      summary: Cancelar operación programada
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: Operación cancelada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledOperationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /scheduled-operations/run:
    post:
      tags: [ScheduledOperations]
      operationId: runScheduledOperations
      summary: Ejecutar operaciones programadas vencidas
      responses:
        '200':
          description: Reporte de ejecución
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionReportResponse'
  /notifications/users/{userId}:
    get:
      tags: [Notifications]
      operationId: getUserNotifications
      summary: Listar notificaciones del usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Notificaciones del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      operationId: markNotificationAsRead
      summary: Marcar notificación como leída
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notificación actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /analytics/summary:
    get:
      tags: [Analytics]
      operationId: getAnalyticsSummary
      summary: Obtener resumen analítico
      responses:
        '200':
          description: Resumen del sistema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummaryResponse'
  /analytics/top-users:
    get:
      tags: [Analytics]
      operationId: getTopUsers
      summary: Obtener usuarios más activos
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Usuarios más activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricItemResponse'
  /analytics/top-wallets:
    get:
      tags: [Analytics]
      operationId: getTopWallets
      summary: Obtener billeteras con mayor uso
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Billeteras con mayor uso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricItemResponse'
  /analytics/top-transactions:
    get:
      tags: [Analytics]
      operationId: getTopTransactions
      summary: Obtener transacciones de mayor valor
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Transacciones de mayor valor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
  /analytics/cycles:
    get:
      tags: [Analytics]
      operationId: getCycles
      summary: Detectar ciclos en el grafo de transferencias
      responses:
        '200':
          description: Ciclos detectados (cada ciclo es lista de user IDs)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: array
                  items:
                    type: string
  /analytics/top-wallet-categories:
    get:
      tags: [Analytics]
      operationId: getTopWalletCategories
      summary: Obtener categorías de billetera más comunes
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Categorías de billetera por conteo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricItemResponse'
  /analytics/movement-by-type:
    get:
      tags: [Analytics]
      operationId: getMovementByType
      summary: Obtener movimientos agrupados por tipo
      responses:
        '200':
          description: Movimientos por tipo (excluye REVERSED y EXTERNAL_TRANSFER_RECEIVED)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricItemResponse'
  /analytics/total-moved:
    get:
      tags: [Analytics]
      operationId: getTotalMoved
      summary: Obtener total movido en un rango de fechas
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Total movido en el rango
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RangeTotalResponse'
        '422':
          $ref: '#/components/responses/BusinessError'
  /analytics/frequent-routes:
    get:
      tags: [Analytics]
      operationId: getFrequentRoutes
      summary: Obtener rutas frecuentes de transferencia
      parameters:
        - name: minTransfers
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Rutas frecuentes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RouteMetricResponse'
  /fraud/events:
    get:
      tags: [Fraud]
      operationId: getFraudEvents
      summary: Listar eventos sospechosos
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/FraudSeverity'
      responses:
        '200':
          description: Eventos sospechosos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FraudEventResponse'
  /benefits:
    get:
      tags: [Benefits]
      operationId: getActiveBenefits
      summary: Listar beneficios activos
      responses:
        '200':
          description: Lista de beneficios activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BenefitResponse'
  /users/{userId}/benefits/{benefitId}/redeem:
    post:
      tags: [Benefits]
      operationId: redeemBenefit
      summary: Canjear un beneficio
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: benefitId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Beneficio canjeado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenefitRedemptionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
  /users/{userId}/benefit-redemptions:
    get:
      tags: [Benefits]
      operationId: getUserBenefitRedemptions
      summary: Listar canjes de beneficios del usuario
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Lista de canjes del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BenefitRedemptionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      example: USR001
    WalletId:
      name: walletId
      in: path
      required: true
      schema:
        type: string
      example: WALLET-001
    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
      example: TX-001
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
      example: OP-001
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
      example: NOTIF-001
    TransactionTypeQuery:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TransactionType'
    TransactionStatusQuery:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TransactionStatus'
  responses:
    BadRequest:
      description: Request inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Conflicto de recurso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BusinessError:
      description: Regla de negocio incumplida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 2
          example: Juan Pérez
        email:
          type: string
          format: email
          example: juan@example.com
    UserResponse:
      type: object
      required: [id, name, email, registeredAt, points, loyaltyLevel, walletCount, totalBalance]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        registeredAt:
          type: string
          format: date-time
        points:
          type: number
          format: double
        loyaltyLevel:
          $ref: '#/components/schemas/LoyaltyLevel'
        walletCount:
          type: integer
        totalBalance:
          type: number
          format: double
    CreateWalletRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: Gastos diarios
        type:
          type: string
          example: DAILY_EXPENSES
    UpdateWalletRequest:
      type: object
      description: Partial update; envía sólo los campos que querés cambiar.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          example: Gastos del mes
        active:
          type: boolean
          description: false = cerrar billetera (requiere balance == 0); true = reabrir.
          example: false
    WalletResponse:
      type: object
      required: [code, name, type, ownerId, balance, active, createdAt, transactionCount]
      properties:
        code:
          type: string
        name:
          type: string
        type:
          type: string
        ownerId:
          type: string
        balance:
          type: number
          format: double
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        transactionCount:
          type: integer
    MoneyOperationRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 1500.0
        description:
          type: string
          example: Recarga inicial
    InternalTransferRequest:
      type: object
      required: [sourceWalletId, targetWalletId, amount]
      properties:
        sourceWalletId:
          type: string
        targetWalletId:
          type: string
        amount:
          type: number
          format: double
          minimum: 0.01
        description:
          type: string
    ExternalTransferRequest:
      type: object
      required: [sourceUserId, sourceWalletId, targetUserId, targetWalletId, amount]
      properties:
        sourceUserId:
          type: string
        sourceWalletId:
          type: string
        targetUserId:
          type: string
        targetWalletId:
          type: string
        amount:
